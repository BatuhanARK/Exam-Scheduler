<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salon Doluluk</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3e;--accent:#4f6ef7;--text:#e2e4f0;--muted:#6b7280;--green:#10b981;--red:#ef4444;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);}
  
  .main{max-width:1300px;margin:0 auto;padding:2rem 1.5rem;}
  h2{font-size:1.4rem;font-weight:600;margin-bottom:.3rem;}
  .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;}
  .filters{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.5rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;margin-bottom:1.5rem;}
  .filters label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:.3rem;}
  .filters input,.filters select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:.4rem .75rem;font-size:.85rem;font-family:inherit;}
  .btn-filter{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:.45rem 1.2rem;font-size:.85rem;cursor:pointer;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;}
  .slot{border:1px solid var(--border);border-radius:10px;padding:1rem;font-size:.82rem;}
  .slot.dolu{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.05);}
  .slot.bos{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.04);}
  .slot .salon-adi{font-weight:600;font-size:.9rem;margin-bottom:.3rem;}
  .slot .kapasite{color:var(--muted);font-size:.75rem;font-family:'IBM Plex Mono',monospace;}
  .slot .ders{font-size:.78rem;color:var(--text);margin-top:.4rem;}
  .slot .durum-badge{display:inline-block;border-radius:4px;padding:.15rem .45rem;font-size:.72rem;font-weight:600;margin-top:.4rem;}
  .slot.dolu .durum-badge{background:rgba(239,68,68,.15);color:var(--red);}
  .slot.bos  .durum-badge{background:rgba(16,185,129,.15);color:var(--green);}
  .oturum-baslik{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:1.5rem 0 .75rem;}
  .loading{text-align:center;padding:3rem;color:var(--muted);}

  .navbar{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 1.5rem;height:52px;
    display:flex;align-items:center;gap:0;
    position:sticky;top:0;z-index:100;
  }
  .nav-brand{
    font-weight:600;font-size:.95rem;color:var(--text);
    text-decoration:none;margin-right:2rem;white-space:nowrap;
    flex-shrink:0;
  }
  .nav-links{
    display:flex;align-items:center;gap:.25rem;flex:1;justify-content:center;
  }
  .nav-links a{
    color:var(--muted);text-decoration:none;font-size:.83rem;
    padding:.4rem .75rem;border-radius:7px;transition:all .15s;
    white-space:nowrap;
  }
  .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.06);}
  .nav-links a.aktif{color:var(--text);background:rgba(79,110,247,.15);}
  .nav-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;margin-left:2rem;}
  .btn-cikis{
    background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:7px;padding:.35rem .75rem;
    font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .15s;
  }
  .btn-cikis:hover{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-brand">📅 Sınav Takvimi</a>
  <div class="nav-links">
      <a href="/sinav-programi">Sınav Programı</a>
      <a href="/gozetmen-yuk">Gözetmen Yükü</a>
      <a href="/program-tablosu">Program Tablosu</a>
    <a href="/salon-doluluk" class="aktif">Salon Doluluk</a>
      {% if rol == "admin" %}<a href="/yonetim">Yönetim</a>{% endif %}
  </div>
  <div class="nav-right">
    <a href="/logout" style="text-decoration:none"><button class="btn-cikis">Çıkış</button></a>
  </div>
</nav>


<div class="main">
  <h2>Salon Doluluk Durumu</h2>
  <p class="subtitle">vw_SalonDolulukDurumu · Tarih ve oturum bazında doluluk</p>

  <div class="filters">
    <div>
      <label>Tarih</label>
      <input type="date" id="f-tarih" value="2026-01-05" min="2026-01-05" max="2026-01-16">
    </div>
    <div>
      <label>Durum</label>
      <select id="f-durum">
        <option value="">Tümü</option>
        <option value="Dolu">Dolu</option>
        <option value="Bos">Boş</option>
      </select>
    </div>
    <button class="btn-filter" onclick="load()">Göster</button>
  </div>

  <div id="icerik"><div class="loading">Yükleniyor...</div></div>
</div>

<script>
async function load() {
  const tarih = document.getElementById('f-tarih').value;
  const durum = document.getElementById('f-durum').value;
  let url = '/api/salon-doluluk?';
  if (tarih) url += `tarih=${tarih}&`;
  if (durum) url += `durum=${durum}&`;

  document.getElementById('icerik').innerHTML = '<div class="loading">Yükleniyor...</div>';
  const res  = await fetch(url);
  const json = await res.json();
  const rows = json.data || [];

  if (!rows.length) {
    document.getElementById('icerik').innerHTML = '<div class="loading">Kayıt bulunamadı.</div>';
    return;
  }

  // Tekrar eden Oturum+Salon kombinasyonlarını dedupe et
  // (aynı salon farklı sınavlara atanmışsa VIEW birden fazla satır döndürebilir)
  const seen = new Set();
  const unique = rows.filter(r => {
    const key = r.Oturum + '|' + r.SalonAdi;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Oturum bazında grupla
  const gruplar = {};
  unique.forEach(r => {
    const key = r.Oturum + ' · ' + (r.BaslangicSaat || '');
    if (!gruplar[key]) gruplar[key] = [];
    gruplar[key].push(r);
  });

  let html = '';
  for (const [oturum, salonlar] of Object.entries(gruplar)) {
    const doluluk = salonlar.filter(s => s.Durum === 'Dolu').length;
    html += `<div class="oturum-baslik">${oturum} — ${doluluk}/${salonlar.length} dolu</div>
    <div class="grid">`;
    salonlar.forEach(s => {
      const cls = s.Durum === 'Dolu' ? 'dolu' : 'bos';
      html += `<div class="slot ${cls}">
        <div class="salon-adi">${s.SalonAdi}</div>
        <div class="kapasite">${s.Tip} · Kat ${s.Kat ?? '?'} · ${s.Kapasite} kişi</div>
        ${s.Durum === 'Dolu'
          ? `<div class="ders">${s.AtananDersKodu} — ${s.AtananDersAdi}</div>`
          : ''}
        <span class="durum-badge">${s.Durum === 'Dolu' ? 'Dolu' : 'Boş'}</span>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('icerik').innerHTML = html;
}
load();
</script>
</body>
</html>
