<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gözetmen Yük Dağılımı</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3e;--accent:#4f6ef7;--text:#e2e4f0;--muted:#6b7280;--green:#10b981;--red:#ef4444;--yellow:#f59e0b; }
  body { font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text); }
  
  .main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
  h2{font-size:1.4rem;font-weight:600;margin-bottom:.3rem;}
  .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;}
  .filters{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.5rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;margin-bottom:1.5rem;}
  .filters label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:.3rem;}
  .filters select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:.4rem .75rem;font-size:.85rem;font-family:inherit;}
  .btn-filter{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:.45rem 1.2rem;font-size:.85rem;cursor:pointer;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .p-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:border-color .2s;}
  .p-card:hover{border-color:var(--accent);}
  .p-card .name{font-weight:600;font-size:.95rem;margin-bottom:.2rem;}
  .p-card .bolum{font-size:.78rem;color:var(--muted);margin-bottom:.8rem;}
  .bar-bg{background:var(--border);border-radius:4px;height:6px;margin-bottom:.5rem;}
  .bar-fill{height:6px;border-radius:4px;transition:width .4s;}
  .p-card .meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);}
  .badge-yuk{border-radius:5px;padding:.2rem .5rem;font-size:.72rem;font-weight:600;}
  .yuk-az     {background:rgba(16,185,129,.12);color:var(--green);}
  .yuk-normal {background:rgba(79,110,247,.12);color:var(--accent);}
  .yuk-fazla  {background:rgba(239,68,68,.12);color:var(--red);}
  .yuk-yok    {background:rgba(107,114,128,.12);color:var(--muted);}
  .loading{text-align:center;padding:3rem;color:var(--muted);}
  .stats{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.25rem;flex:1;min-width:130px;}
  .stat-card .val{font-size:1.6rem;font-weight:600;}.stat-card .lbl{font-size:.75rem;color:var(--muted);}

  .navbar{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 1.5rem;height:52px;
    display:flex;align-items:center;gap:0;
    position:sticky;top:0;z-index:100;
  }
  .nav-brand{
    font-weight:600;font-size:.95rem;color:var(--text);
    text-decoration:none;margin-right:2rem;white-space:nowrap;
    flex-shrink:0;
  }
  .nav-links{
    display:flex;align-items:center;gap:.25rem;flex:1;justify-content:center;
  }
  .nav-links a{
    color:var(--muted);text-decoration:none;font-size:.83rem;
    padding:.4rem .75rem;border-radius:7px;transition:all .15s;
    white-space:nowrap;
  }
  .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.06);}
  .nav-links a.aktif{color:var(--text);background:rgba(79,110,247,.15);}
  .nav-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;margin-left:2rem;}
  .btn-cikis{
    background:transparent;border:1px solid var(--border);
    color:var(--muted);border-radius:7px;padding:.35rem .75rem;
    font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .15s;
  }
  .btn-cikis:hover{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-brand">📅 Sınav Takvimi</a>
  <div class="nav-links">
      <a href="/sinav-programi">Sınav Programı</a>
      <a href="/gozetmen-yuk" class="aktif">Gözetmen Yükü</a>
      <a href="/program-tablosu">Program Tablosu</a>
    <a href="/salon-doluluk">Salon Doluluk</a>
      {% if rol == "admin" %}<a href="/yonetim">Yönetim</a>{% endif %}
  </div>
  <div class="nav-right">
    <a href="/logout" style="text-decoration:none"><button class="btn-cikis">Çıkış</button></a>
  </div>
</nav>


<div class="main">
  <h2>Gözetmen Yük Dağılımı</h2>
  <p class="subtitle">vw_GozetmenYukDagilimi · Adil dağıtım takibi</p>

  <div class="filters">
    <div>
      <label>Bölüm</label>
      <select id="f-bolum">
        <option value="">Tümü</option>
        <option>Yazılım Mühendisliği</option>
        <option>Bilgisayar Mühendisliği</option>
        <option>Elektrik-Elektronik Müh.</option>
        <option>Makine Mühendisliği</option>
        <option>İnşaat Mühendisliği</option>
        <option>Endüstri Mühendisliği</option>
      </select>
    </div>
    <div>
      <label>Yük Seviyesi</label>
      <select id="f-yuk">
        <option value="">Tümü</option>
        <option>Görev Yok</option>
        <option>Az</option>
        <option>Normal</option>
        <option>Fazla</option>
      </select>
    </div>
    <button class="btn-filter" onclick="load()">Filtrele</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="val" id="s-toplam">—</div><div class="lbl">Toplam Personel</div></div>
    <div class="stat-card"><div class="val" id="s-ort">—</div><div class="lbl">Ortalama Görev</div></div>
    <div class="stat-card"><div class="val" id="s-max" style="color:var(--red)">—</div><div class="lbl">Maksimum Görev</div></div>
    <div class="stat-card"><div class="val" id="s-yok" style="color:var(--muted)">—</div><div class="lbl">Görev Almayan</div></div>
  </div>

  <div id="kartlar" class="card-grid"><div class="loading">Yükleniyor...</div></div>
</div>

<script>
const renkler = {'Görev Yok':'#6b7280','Az':'#10b981','Normal':'#4f6ef7','Fazla':'#ef4444'};

async function load() {
  const bolum = document.getElementById('f-bolum').value;
  const yuk   = document.getElementById('f-yuk').value;
  let url = '/api/gozetmen-yuk?';
  if (bolum) url += `bolum=${encodeURIComponent(bolum)}&`;
  if (yuk)   url += `yuk_seviyesi=${encodeURIComponent(yuk)}&`;

  document.getElementById('kartlar').innerHTML = '<div class="loading">Yükleniyor...</div>';

  const res  = await fetch(url);
  const json = await res.json();
  const rows = json.data || [];

  // İstatistikler
  const gorevler = rows.map(r => r.ToplamGorev);
  document.getElementById('s-toplam').textContent = rows.length;
  document.getElementById('s-ort').textContent    = rows.length ? (gorevler.reduce((a,b)=>a+b,0)/rows.length).toFixed(1) : 0;
  document.getElementById('s-max').textContent    = rows.length ? Math.max(...gorevler) : 0;
  document.getElementById('s-yok').textContent    = rows.filter(r=>r.ToplamGorev===0).length;

  const maxGorev = Math.max(...gorevler, 1);
  const html = rows.map(r => {
    const pct    = (r.ToplamGorev / maxGorev * 100).toFixed(0);
    const renk   = renkler[r.YukSeviyesi] || '#6b7280';
    const yukCls = {'Görev Yok':'yuk-yok','Az':'yuk-az','Normal':'yuk-normal','Fazla':'yuk-fazla'}[r.YukSeviyesi] || 'yuk-yok';
    return `<div class="p-card">
      <div class="name">${r.Unvan} ${r.AdSoyad}</div>
      <div class="bolum">${r.Bolum}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${renk}"></div></div>
      <div class="meta">
        <span>${r.ToplamGorev} görev · ${r.ToplamSaat || 0}s</span>
        <span class="badge-yuk ${yukCls}">${r.YukSeviyesi}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('kartlar').innerHTML = html || '<div class="loading">Kayıt bulunamadı.</div>';
}
load();
</script>
</body>
</html>
